<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SonicCut | Professional Audio Editor</title>
  <style>
    :root {
      --bg: #0f1115;
      --surface: #1a1d24;
      --surface-hover: #252830;
      --border: #2d313a;
      --text: #e6e8eb;
      --text-muted: #8b92a0;
      --accent: #6c5ce7;
      --accent-hover: #7a6ef5;
      --success: #00b894;
      --warning: #fdcb6e;
      --danger: #d63031;
      --radius: 8px;
      --shadow: 0 4px 12px rgba(0,0,0,0.3);
      --transition: all 0.2s ease;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 1rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .logo { font-size: 1.4rem; font-weight: 700; color: var(--accent); }
    .logo span { color: var(--text); }

    main {
      flex: 1;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      max-width: 1200px;
      width: 100%;
      margin: 0 auto;
    }

    .drop-zone {
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      padding: 3rem;
      text-align: center;
      transition: var(--transition);
      cursor: pointer;
      background: var(--surface);
    }
    .drop-zone:hover, .drop-zone.drag-over {
      border-color: var(--accent);
      background: var(--surface-hover);
    }
    .drop-zone p { color: var(--text-muted); margin-top: 0.5rem; }

    .editor-panel {
      display: none;
      flex-direction: column;
      gap: 1rem;
      background: var(--surface);
      border-radius: var(--radius);
      padding: 1.2rem;
      box-shadow: var(--shadow);
    }
    .editor-panel.active { display: flex; }

    .waveform-container {
      position: relative;
      height: 180px;
      background: var(--bg);
      border-radius: var(--radius);
      overflow: hidden;
      border: 1px solid var(--border);
    }
    canvas { display: block; width: 100%; height: 100%; }
    .selection-overlay {
      position: absolute; top: 0; bottom: 0;
      background: rgba(108, 92, 231, 0.25);
      border-left: 2px solid var(--accent);
      border-right: 2px solid var(--accent);
      pointer-events: none;
      display: none;
    }

    .controls {
      display: flex;
      gap: 0.8rem;
      flex-wrap: wrap;
      align-items: center;
    }
    button {
      background: var(--surface-hover);
      color: var(--text);
      border: 1px solid var(--border);
      padding: 0.6rem 1rem;
      border-radius: var(--radius);
      cursor: pointer;
      font-size: 0.9rem;
      transition: var(--transition);
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
    }
    button:hover:not(:disabled) { background: var(--accent); border-color: var(--accent); }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    button.primary { background: var(--accent); border-color: var(--accent); }
    button.primary:hover { background: var(--accent-hover); }

    .info-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: var(--text-muted);
      font-size: 0.85rem;
      padding: 0.5rem 0;
      border-top: 1px solid var(--border);
      margin-top: auto;
    }
    .timer {
      font-family: monospace;
      font-size: 1.1rem;
      color: var(--text);
      background: var(--bg);
      padding: 0.3rem 0.6rem;
      border-radius: 4px;
      min-width: 110px;
      text-align: center;
    }

    .status {
      padding: 0.8rem;
      background: var(--bg);
      border-radius: var(--radius);
      color: var(--text-muted);
      font-size: 0.9rem;
      text-align: center;
      min-height: 42px;
    }

    @media (max-width: 600px) {
      main { padding: 1rem; }
      .controls { flex-direction: column; align-items: stretch; }
      button { width: 100%; justify-content: center; }
    }
  </style>
</head>
<body>
  <header>
    <div class="logo">Sonic<span>Cut</span></div>
    <div id="file-name" style="color: var(--text-muted); font-size: 0.9rem;"></div>
  </header>

  <main>
    <div class="drop-zone" id="drop-zone">
      <h2>Drag & Drop Audio File</h2>
      <p>Supports MP3, WAV, OGG, FLAC, AAC</p>
      <input type="file" id="file-input" accept="audio/*" hidden>
    </div>

    <div class="editor-panel" id="editor">
      <div class="waveform-container">
        <canvas id="waveform"></canvas>
        <div class="selection-overlay" id="selection"></div>
      </div>

      <div class="controls">
        <button id="play-btn">▶ Play</button>
        <button id="pause-btn" disabled>⏸ Pause</button>
        <button id="stop-btn" disabled>⏹ Stop</button>
        <button id="undo-btn" disabled>↩ Undo</button>
        <button id="ripple-cut-btn" disabled>✂ Ripple Cut</button>
      </div>

      <div class="status" id="status">Load an audio file to begin editing</div>

      <div class="info-bar">
        <span id="duration">00:00.00</span>
        <div class="timer" id="timer">00:00.00</div>
        <span id="selection-info"></span>
      </div>
    </div>
  </main>

  <script>
    // Audio Context & State
    let audioCtx;
    let audioBuffer;
    let sourceNode;
    let isPlaying = false;
    let playbackOffset = 0;
    let playbackStartTime = 0;
    let undoStack = [];
    const MAX_UNDO = 20;

    // Selection
    let selectionStart = null;
    let selectionEnd = null;
    let isSelecting = false;
    let mouseDownX = 0;

    // DOM Elements
    const dropZone = document.getElementById('drop-zone');
    const fileInput = document.getElementById('file-input');
    const editor = document.getElementById('editor');
    const fileNameEl = document.getElementById('file-name');
    const canvas = document.getElementById('waveform');
    const ctx = canvas.getContext('2d');
    const selectionEl = document.getElementById('selection');
    const playBtn = document.getElementById('play-btn');
    const pauseBtn = document.getElementById('pause-btn');
    const stopBtn = document.getElementById('stop-btn');
    const undoBtn = document.getElementById('undo-btn');
    const rippleCutBtn = document.getElementById('ripple-cut-btn');
    const statusEl = document.getElementById('status');
    const timerEl = document.getElementById('timer');
    const durationEl = document.getElementById('duration');
    const selectionInfoEl = document.getElementById('selection-info');

    // Initialize Audio Context on user gesture
    function initAudio() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      if (audioCtx.state === 'suspended') {
        audioCtx.resume();
      }
    }

    // File Handling
    dropZone.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', e => e.target.files[0] && loadFile(e.target.files[0]));
    dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
    dropZone.addEventListener('drop', e => {
      e.preventDefault();
      dropZone.classList.remove('drag-over');
      const file = e.dataTransfer.files[0];
      if (file && file.type.startsWith('audio/')) loadFile(file);
    });

    async function loadFile(file) {
      initAudio();
      statusEl.textContent = 'Decoding audio...';
      try {
        const arrayBuffer = await file.arrayBuffer();
        const decoded = await audioCtx.decodeAudioData(arrayBuffer);
        audioBuffer = decoded;
        fileNameEl.textContent = file.name;
        resetSelection();
        saveState();
        renderWaveform();
        dropZone.style.display = 'none';
        editor.classList.add('active');
        statusEl.textContent = 'Ready. Select region on waveform to cut.';
        rippleCutBtn.disabled = false;
        updateUI();
      } catch (err) {
        statusEl.textContent = 'Error decoding audio. Try another file.';
        console.error(err);
      }
    }

    // Waveform Rendering (Downsampled for performance)
    function renderWaveform() {
      const dpr = window.devicePixelRatio || 1;
      const rect = canvas.getBoundingClientRect();
      canvas.width = rect.width * dpr;
      canvas.height = rect.height * dpr;
      ctx.scale(dpr, dpr);

      const width = rect.width;
      const height = rect.height;
      const data = audioBuffer.getChannelData(0);
      const step = Math.ceil(data.length / width);
      const amp = height / 2;

      ctx.clearRect(0, 0, width, height);
      ctx.strokeStyle = '#6c5ce7';
      ctx.lineWidth = 1.5;
      ctx.beginPath();

      for (let i = 0; i < width; i++) {
        let min = 1.0, max = -1.0;
        for (let j = 0; j < step; j++) {
          const val = data[i * step + j] || 0;
          if (val < min) min = val;
          if (val > max) max = val;
        }
        const y1 = (1 + min) * amp;
        const y2 = (1 + max) * amp;
        ctx.moveTo(i, y1);
        ctx.lineTo(i, y2);
      }
      ctx.stroke();
    }

    // Selection Handling
    canvas.addEventListener('mousedown', e => {
      isSelecting = true;
      const rect = canvas.getBoundingClientRect();
      mouseDownX = e.clientX - rect.left;
      selectionStart = null;
      selectionEnd = null;
      selectionEl.style.display = 'none';
    });

    canvas.addEventListener('mousemove', e => {
      if (!isSelecting || !audioBuffer) return;
      const rect = canvas.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const ratio = x / rect.width;
      const time = ratio * audioBuffer.duration;

      if (mouseDownX <= x) {
        selectionStart = (mouseDownX / rect.width) * audioBuffer.duration;
        selectionEnd = time;
      } else {
        selectionStart = time;
        selectionEnd = (mouseDownX / rect.width) * audioBuffer.duration;
      }

      const leftPct = (selectionStart / audioBuffer.duration) * 100;
      const widthPct = ((selectionEnd - selectionStart) / audioBuffer.duration) * 100;
      selectionEl.style.left = `${leftPct}%`;
      selectionEl.style.width = `${widthPct}%`;
      selectionEl.style.display = 'block';
      selectionInfoEl.textContent = `${formatTime(selectionStart)} → ${formatTime(selectionEnd)}`;
    });

    canvas.addEventListener('mouseup', () => {
      isSelecting = false;
      rippleCutBtn.disabled = (selectionStart === null || selectionEnd === null);
    });

    function resetSelection() {
      selectionStart = null;
      selectionEnd = null;
      selectionEl.style.display = 'none';
      selectionInfoEl.textContent = '';
      rippleCutBtn.disabled = true;
    }

    // Playback
    playBtn.addEventListener('click', () => {
      initAudio();
      if (isPlaying) return;
      sourceNode = audioCtx.createBufferSource();
      sourceNode.buffer = audioBuffer;
      sourceNode.connect(audioCtx.destination);
      sourceNode.start(0, playbackOffset);
      playbackStartTime = audioCtx.currentTime;
      isPlaying = true;
      playBtn.disabled = true;
      pauseBtn.disabled = false;
      stopBtn.disabled = false;
      statusEl.textContent = 'Playing...';
      requestAnimationFrame(updateTimer);
    });

    pauseBtn.addEventListener('click', () => {
      if (!isPlaying) return;
      playbackOffset += audioCtx.currentTime - playbackStartTime;
      sourceNode.stop();
      isPlaying = false;
      playBtn.disabled = false;
      pauseBtn.disabled = true;
      stopBtn.disabled = false;
      statusEl.textContent = 'Paused';
    });

    stopBtn.addEventListener('click', () => {
      if (isPlaying) {
        sourceNode.stop();
        isPlaying = false;
      }
      playbackOffset = 0;
      playBtn.disabled = false;
      pauseBtn.disabled = true;
      stopBtn.disabled = true;
      statusEl.textContent = 'Stopped';
      timerEl.textContent = '00:00.00';
    });

    // Timer
    function updateTimer() {
      if (!isPlaying) return;
      const elapsed = playbackOffset + (audioCtx.currentTime - playbackStartTime);
      timerEl.textContent = formatTime(elapsed);
      requestAnimationFrame(updateTimer);
    }

    // Ripple Cut
    rippleCutBtn.addEventListener('click', () => {
      if (selectionStart === null || selectionEnd === null) return;
      initAudio();
      try {
        const sr = audioBuffer.sampleRate;
        const ch = audioBuffer.numberOfChannels;
        const startSamp = Math.floor(selectionStart * sr);
        const endSamp = Math.floor(selectionEnd * sr);
        const newLen = audioBuffer.length - (endSamp - startSamp);
        if (newLen <= 0) throw new Error('Cannot cut entire audio');

        const newBuf = audioCtx.createBuffer(ch, newLen, sr);
        for (let c = 0; c < ch; c++) {
          const oldData = audioBuffer.getChannelData(c);
          const newData = newBuf.getChannelData(c);
          newData.set(oldData.subarray(0, startSamp), 0);
          newData.set(oldData.subarray(endSamp), startSamp);
        }

        saveState();
        audioBuffer = newBuf;
        playbackOffset = Math.min(playbackOffset, audioBuffer.duration);
        renderWaveform();
        resetSelection();
        statusEl.textContent = `Ripple cut applied. Duration: ${formatTime(audioBuffer.duration)}`;
        updateUI();
      } catch (err) {
        statusEl.textContent = err.message;
        console.error(err);
      }
    });

    // Undo
    undoBtn.addEventListener('click', () => {
      if (undoStack.length <= 1) return;
      initAudio();
      undoStack.pop(); // Remove current
      audioBuffer = cloneBuffer(undoStack[undoStack.length - 1]);
      playbackOffset = 0;
      if (isPlaying) sourceNode.stop();
      isPlaying = false;
      renderWaveform();
      resetSelection();
      statusEl.textContent = 'Undone';
      updateUI();
    });

    function saveState() {
      const clone = cloneBuffer(audioBuffer);
      undoStack.push(clone);
      if (undoStack.length > MAX_UNDO) undoStack.shift();
      undoBtn.disabled = false;
    }

    function cloneBuffer(buf) {
      const newBuf = audioCtx.createBuffer(buf.numberOfChannels, buf.length, buf.sampleRate);
      for (let i = 0; i < buf.numberOfChannels; i++) {
        newBuf.getChannelData(i).set(buf.getChannelData(i));
      }
      return newBuf;
    }

    // UI Helpers
    function updateUI() {
      durationEl.textContent = formatTime(audioBuffer.duration);
      playBtn.disabled = isPlaying;
      undoBtn.disabled = undoStack.length <= 1;
      rippleCutBtn.disabled = selectionStart === null;
    }

    function formatTime(sec) {
      if (isNaN(sec) || sec < 0) sec = 0;
      const m = Math.floor(sec / 60);
      const s = sec % 60;
      return `${m.toString().padStart(2, '0')}:${s.toFixed(2).padStart(5, '0')}`;
    }

    // Resize handler
    window.addEventListener('resize', () => {
      if (audioBuffer) renderWaveform();
    });
  </script>
</body>
</html>
