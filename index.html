<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Simple Audio Editor</title>
<style>
body {
  font-family: Arial;
  background: #111;
  color: white;
  text-align: center;
  padding: 20px;
}

.container {
  max-width: 900px;
  margin: auto;
}

canvas {
  width: 100%;
  height: 120px;
  background: #222;
  margin-top: 10px;
  border-radius: 10px;
}

button {
  padding: 10px 15px;
  margin: 5px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

button:hover {
  opacity: 0.8;
}

.controls {
  margin-top: 10px;
}

input {
  margin: 10px;
}

</style>
</head>

<body>

<div class="container">

<h2>🎧 Simple Audio Editor</h2>

<input type="file" id="fileInput" accept="audio/*">

<canvas id="waveform"></canvas>

<div class="controls">

<button onclick="playAudio()">▶ Play</button>
<button onclick="pauseAudio()">⏸ Pause</button>
<button onclick="cutSelection()">✂ Cut Selection</button>
<button onclick="downloadAudio()">⬇ Download</button>

</div>

<p id="info">Load an audio file to start</p>

</div>

<script>
let audioCtx = new (window.AudioContext || window.webkitAudioContext)();
let audioBuffer;
let source;
let audioData;

let canvas = document.getElementById("waveform");
let ctx = canvas.getContext("2d");

let startX = null;
let endX = null;

// Load file
document.getElementById("fileInput").addEventListener("change", async function(e) {
    let file = e.target.files[0];
    let arrayBuffer = await file.arrayBuffer();

    audioBuffer = await audioCtx.decodeAudioData(arrayBuffer);

    drawWaveform();
    document.getElementById("info").innerText = "Audio loaded ✔ Click waveform to select cut region";
});

// Draw waveform
function drawWaveform() {
    let data = audioBuffer.getChannelData(0);
    let step = Math.ceil(data.length / canvas.width);
    let amp = canvas.height / 2;

    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = "#0f0";

    for (let i = 0; i < canvas.width; i++) {
        let min = 1.0;
        let max = -1.0;

        for (let j = 0; j < step; j++) {
            let datum = data[(i * step) + j];
            if (datum < min) min = datum;
            if (datum > max) max = datum;
        }

        ctx.fillRect(i, (1 + min) * amp, 1, Math.max(1, (max - min) * amp));
    }
}

// Play
function playAudio() {
    if (source) source.stop();

    source = audioCtx.createBufferSource();
    source.buffer = audioBuffer;
    source.connect(audioCtx.destination);
    source.start();
}

// Pause
function pauseAudio() {
    if (source) source.stop();
}

// Select region
canvas.addEventListener("click", function(e) {
    let rect = canvas.getBoundingClientRect();
    let x = e.clientX - rect.left;

    if (startX === null) {
        startX = x;
        document.getElementById("info").innerText = "Start selected";
    } else {
        endX = x;
        document.getElementById("info").innerText = "End selected";
    }
});

// Cut selected region
function cutSelection() {
    if (startX === null || endX === null) {
        alert("Select a region first");
        return;
    }

    let start = Math.min(startX, endX);
    let end = Math.max(startX, endX);

    let duration = audioBuffer.duration;
    let startTime = (start / canvas.width) * duration;
    let endTime = (end / canvas.width) * duration;

    let sampleRate = audioBuffer.sampleRate;
    let newBuffer = audioCtx.createBuffer(
        audioBuffer.numberOfChannels,
        audioBuffer.length,
        sampleRate
    );

    for (let ch = 0; ch < audioBuffer.numberOfChannels; ch++) {
        let oldData = audioBuffer.getChannelData(ch);
        let newData = newBuffer.getChannelData(ch);

        let cutStart = Math.floor(startTime * sampleRate);
        let cutEnd = Math.floor(endTime * sampleRate);

        let offset = 0;

        for (let i = 0; i < oldData.length; i++) {
            if (i < cutStart || i > cutEnd) {
                newData[offset++] = oldData[i];
            }
        }
    }

    audioBuffer = newBuffer;
    drawWaveform();

    document.getElementById("info").innerText = "Cut applied ✔";
}

// Download audio
function downloadAudio() {
    let wav = bufferToWav(audioBuffer);
    let blob = new Blob([wav], { type: "audio/wav" });

    let url = URL.createObjectURL(blob);
    let a = document.createElement("a");
    a.href = url;
    a.download = "edited.wav";
    a.click();
}

// Convert buffer to wav
function bufferToWav(buffer) {
    let length = buffer.length * buffer.numberOfChannels * 2 + 44;
    let arrayBuffer = new ArrayBuffer(length);
    let view = new DataView(arrayBuffer);

    function writeString(view, offset, string) {
        for (let i = 0; i < string.length; i++) {
            view.setUint8(offset + i, string.charCodeAt(i));
        }
    }

    let offset = 0;

    writeString(view, offset, "RIFF"); offset += 4;
    view.setUint32(offset, 36 + buffer.length * 2, true); offset += 4;
    writeString(view, offset, "WAVE"); offset += 4;
    writeString(view, offset, "fmt "); offset += 4;
    view.setUint32(offset, 16, true); offset += 4;
    view.setUint16(offset, 1, true); offset += 2;
    view.setUint16(offset, buffer.numberOfChannels, true); offset += 2;
    view.setUint32(offset, buffer.sampleRate, true); offset += 4;
    view.setUint32(offset, buffer.sampleRate * 2 * buffer.numberOfChannels, true); offset += 4;
    view.setUint16(offset, buffer.numberOfChannels * 2, true); offset += 2;
    view.setUint16(offset, 16, true); offset += 2;

    writeString(view, offset, "data"); offset += 4;
    view.setUint32(offset, buffer.length * 2, true); offset += 4;

    let data = buffer.getChannelData(0);
    let pos = offset;

    for (let i = 0; i < buffer.length; i++) {
        let sample = Math.max(-1, Math.min(1, data[i]));
        view.setInt16(pos, sample * 0x7FFF, true);
        pos += 2;
    }

    return arrayBuffer;
}

</script>

</body>
</html>
